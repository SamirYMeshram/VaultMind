name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Build debug
        run: gradle assembleDebug

      - name: Run unit tests
        run: gradle testDebugUnitTest

      - name: Android lint
        run: gradle lintDebug

      - name: ktlint
        run: gradle ktlintCheck

      - name: detekt
        run: gradle detekt
